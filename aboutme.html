	<link rel="stylesheet" href="assets/css/loaderCSS.css" media="all">

<body>
	<div class="loader">
		<div class="loadingIcon">
			<svg class="loader_ear_L" aria-label="piggy's ear left (backside)">
				<use href="assets/images/Piggy_Full.svg#ear-back-l"></use>
			</svg>
			<svg class="loader_ear_R" aria-label="piggy's ear right (backside)">
				<use href="assets/images/Piggy_Full.svg#ear-back-r"></use>
			</svg>
			<svg aria-label="piggy's head">
				<use href="assets/images/Piggy_Full.svg#head"></use>
			</svg>
			<svg class="loader_ear_L" aria-label="piggy's ear left (frontside)">
				<use href="assets/images/Piggy_Full.svg#ear-front-l"></use>
			</svg>
			<svg class="loader_ear_R" aria-label="piggy's ear right (frontside)">
				<use href="assets/images/Piggy_Full.svg#ear-front-r"></use>
			</svg>
			<svg class="loader_eyes loader_eyes_anim" aria-label="piggy's eyes">
				<use href="assets/images/Piggy_Full.svg#eyes-neutral"></use>
			</svg>
			<svg class="loader_mouth invisible" aria-label="piggy's mouth">
				<use href="assets/images/Piggy_Full.svg#mouth-happy"></use>
			</svg>
			<svg class="loader_nose" aria-label="piggy's nose">
				<use href="assets/images/Piggy_Full.svg#nose"></use>
			</svg>
			<svg class="loader_glasses" aria-label="piggy's glasses">
				<use href="assets/images/Piggy_Full.svg#glasses"></use>
			</svg>
		</div>
		<h1 class="loadertext noHoverScale">LOADING</h1>
	</div>

	<canvas id="hearts" class="blurry"></canvas>

	<div class="upperContent invisible">
		<div class="content">
			<link rel="stylesheet" href="assets/css/backgroundEffects.css" media="all">

			<div class="menu">
				<h1>About Me</h1>
				<h2></h2>
				<ul>
					<li class="Trigger_smile Trigger_bg_birthday"><span>Birthday: May 28</span></li>
					<li class="Trigger_happy Trigger_bg_pink"><span>Favorite color: Pink</span></li>
					<li class="Trigger_heart Trigger_bg_nature"><span>Loves nature</span></li>
				</ul>
				<a class="Trigger_heart" href="favoritegames.html">My Favorite Games</a>
				<a href="index.html">Back</a>
			</div>
			
			<svg class="pink backgroundElement" aria-label="pink hills">
				<use href="assets/images/background/OtherBackgroundLayers.svg#pinkBackground"></use>
			</svg>
			<div class="naturebackground backgroundElement"></div>
			<svg class="nature backgroundElement" aria-label="green hills featuring a river and trees">
				<use href="assets/images/background/nature_combined.svg#hills"></use>
			</svg>
			<svg class="nature backgroundElement" aria-label="background grass">
				<use href="assets/images/background/nature_combined.svg#grass_behind"></use>
			</svg>
			<svg class="nature backgroundElement" aria-label="background flowers">
				<use href="assets/images/background/nature_combined.svg#flowers"></use>
			</svg>
			<svg class="birthday backgroundElement" aria-label="birthday flags">
				<use href="assets/images/background/OtherBackgroundLayers.svg#birthdayflags"></use>
			</svg>
			<svg class="nature foregroundElement" aria-label="grass in front of piggy">
				<use href="assets/images/Piggy_Full.svg#grass_infront"></use>
			</svg>

			<script src="assets/javascript/backgroundEffects.js" defer></script>
		</div>
	</div>

	<div class="piggy invisible">
		<svg class="body" aria-label="piggy's body">
			<use href="assets/images/Piggy_Full.svg#body"></use>
		</svg>
		<svg class="ear_l behind" aria-label="piggy's ear left (backside)">
			<use href="assets/images/Piggy_Full.svg#ear-back-l"></use>
		</svg>
		<svg class="ear_r behind" aria-label="piggy's ear right (backside)">
			<use href="assets/images/Piggy_Full.svg#ear-back-r"></use>
		</svg>
		<svg class="head" aria-label="piggy's head">
			<use href="assets/images/Piggy_Full.svg#head"></use>
		</svg>
		<svg class="ear_l" aria-label="piggy's ear left (frontside)">
			<use href="assets/images/Piggy_Full.svg#ear-front-l"></use>
		</svg>
		<svg class="ear_r" aria-label="piggy's ear right (frontside)">
			<use href="assets/images/Piggy_Full.svg#ear-front-r"></use>
		</svg>
		<svg class="eyes" aria-label="piggy's eyes">
			<use href="assets/images/Piggy_Full.svg#eyes-neutral"></use>
		</svg>
		<svg class="mouth" aria-label="piggy's mouth">
			<use href="assets/images/Piggy_Full.svg#mouth-neutral"></use>
		</svg>
		<svg class="nose" aria-label="piggy's nose">
			<use href="assets/images/Piggy_Full.svg#nose"></use>
		</svg>
		<div class="ears-hitbox ears-hitbox-1 hitbox"></div>
		<div class="ears-hitbox ears-hitbox-2 hitbox"></div>
		<div class="nose-hitbox hitbox"></div>
		<div class="glasses-hitbox glasses-hitbox-1 hitbox"></div>
		<div class="glasses-hitbox glasses-hitbox-2 hitbox"></div>
		<svg class="glassesCracks" aria-label="piggy's cracked glasses">
			<use href="assets/images/Piggy_Full.svg#glasses-cracks"></use>
		</svg>
		<svg class="glasses" aria-label="piggy's glasses">
			<use href="assets/images/Piggy_Full.svg#glasses"></use>
		</svg>
		<svg class="nature foregroundElement naturePiggy" aria-label="grass in front of piggy">
			<use href="assets/images/Piggy_Full.svg#grass_infront"></use>
		</svg>
	</div>

	<script src="assets/javascript/MainScript.js" defer></script>
	<script src="assets/javascript/Piggy.js" defer></script>
